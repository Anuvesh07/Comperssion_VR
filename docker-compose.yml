services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-builder
    command: ["./target/release/backend"]
    working_dir: /app/backend
    ports:
      - "3001:3001"
    environment:
      - RUST_LOG=info

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-builder
    command: ["npx", "next", "start"]
    working_dir: /app/frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
